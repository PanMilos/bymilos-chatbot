<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatbot Demo — bymilos.cz</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f7fb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 18px;
      padding: 48px 40px;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 4px 32px rgba(0,0,0,.09);
      text-align: center;
    }
    .logo { font-size: 28px; font-weight: 800; color: #1a2e4a; margin-bottom: 8px; }
    .logo span { color: #2d6cdf; }
    p { color: #667; font-size: 15px; line-height: 1.6; margin-top: 12px; }
    .badge {
      display: inline-block;
      background: #eef4ff;
      color: #2d6cdf;
      font-size: 13px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      margin-top: 20px;
    }
    .hint {
      margin-top: 32px;
      background: #f8faff;
      border: 1px solid #dce8ff;
      border-radius: 12px;
      padding: 18px 20px;
      text-align: left;
    }
    .hint h3 { font-size: 13px; color: #1a2e4a; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
    .hint ul { margin-top: 10px; padding-left: 18px; }
    .hint li { font-size: 14px; color: #445; line-height: 1.8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">by<span>Miloš</span></div>
    <p>Testovací stránka AI chatbota. Klikni na ikonku vpravo dole a vyzkoušej si konverzaci.</p>
    <div class="badge">✅ Gemini 2.5 Flash · Zdarma</div>

    <div class="hint">
      <h3>Zkus se zeptat</h3>
      <ul>
        <li>Kolik stojí tvorba webu?</li>
        <li>Co je zahrnuto ve správě webu?</li>
        <li>Děláte e-shopy?</li>
        <li>Jak rychle web dodáte?</li>
        <li>Jak vás mohu kontaktovat?</li>
      </ul>
    </div>
  </div>

  <!-- Chatbot embed -->
  <script>
    window.chatbotConfig = {
      botName: 'Asistent Miloše',
      greeting: 'Ahoj! 👋 Jsem digitální asistent Miloše. Ptejte se na weby, správu nebo ceny – rád pomůžu.',
      primaryColor: '#1a2e4a',
      accentColor: '#2d6cdf',
      apiUrl: '/api/chat',
      position: 'right'
    };
  </script>
  <script src="/widget.js"></script>
</body>
</html>
